<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SoccerSolver Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=IBM+Plex+Mono&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* h2h-names centrado con separador */
        .h2h-names {
            font-family: var(--font-display);
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-align: center;
            color: var(--text);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .h2h-names .vs-sep {
            font-size: 0.65rem;
            color: var(--muted);
            font-family: var(--font-mono);
        }
    </style>
</head>
<body>

<div class="mob-view" id="view-xi">
<div class="sidebar">
    <div class="brand">
        <div class="brand-icon">⬡</div>
        <h1>SOCCER<span>SOLVER</span></h1>
    </div>

    <div class="section-divider"><span>CONFIGURATION</span></div>
    <div class="control-group">
        <label>Team</label>
        <select id="teamSelect" onchange="loadPlayers()"></select>
    </div>
    <div class="control-group">
        <label>Formation</label>
        <select id="formationSelect" onchange="renderSlots()">
            <option value="442">4-4-2</option>
            <option value="433">4-3-3</option>
        </select>
    </div>

    <div class="section-divider"><span>MODE</span></div>
    <div class="control-group btn-group">
        <button onclick="autoXI('max')" class="btn-max">MAXIMIZE XI</button>
        <button onclick="autoXI('min')" class="btn-min" style="background:#f87171">MINIMIZE XI</button>
    </div>

    <div class="section-divider"><span>STARTING XI</span></div>
    <div id="selectors" class="player-panel-grid"></div>
</div>
</div><!-- /view-xi -->

<div class="mob-view active" id="view-pitch">
<div class="content">
    <div class="pitch-wrap">
        <div class="pitch-container">
            <svg id="pitch" viewBox="0 0 400 600">
                <!-- Field background -->
                <rect x="0" y="0" width="400" height="600" fill="#0a1628"/>
                <!-- Grass subtle gradient -->
                <defs>
                    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#0d1e38"/>
                        <stop offset="100%" stop-color="#091422"/>
                    </linearGradient>
                </defs>
                <rect x="0" y="0" width="400" height="600" fill="url(#grassGrad)"/>
                <!-- Field lines -->
                <rect x="18" y="18" width="364" height="564" fill="none" stroke="rgba(56,189,248,0.18)" stroke-width="1.5" rx="2"/>
                <!-- Halfway line -->
                <line x1="18" y1="300" x2="382" y2="300" stroke="rgba(56,189,248,0.18)" stroke-width="1.5"/>
                <!-- Centre circle -->
                <circle cx="200" cy="300" r="52" fill="none" stroke="rgba(56,189,248,0.18)" stroke-width="1.5"/>
                <circle cx="200" cy="300" r="3" fill="rgba(56,189,248,0.3)"/>
                <!-- Penalty areas -->
                <rect x="108" y="18"  width="184" height="68" fill="none" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
                <rect x="108" y="514" width="184" height="68" fill="none" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
                <!-- Goal areas -->
                <rect x="152" y="18"  width="96" height="30" fill="none" stroke="rgba(56,189,248,0.1)" stroke-width="1"/>
                <rect x="152" y="552" width="96" height="30" fill="none" stroke="rgba(56,189,248,0.1)" stroke-width="1"/>
                <!-- Corner arcs -->
                <path d="M18 34 Q26 18 34 18"  fill="none" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
                <path d="M382 34 Q374 18 366 18" fill="none" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
                <path d="M18 566 Q26 582 34 582" fill="none" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
                <path d="M382 566 Q374 582 366 582" fill="none" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>

                <g id="edges"></g>
                <g id="nodes"></g>

                <!-- ── TOTAL CHEMISTRY BADGE ─────────────────────── -->
                <g id="totalBadge">
                    <!-- Card background -->
                    <rect x="8" y="8" width="200" height="58" rx="7"
                          fill="rgba(7,16,31,0.88)" stroke="rgba(56,189,248,0.22)" stroke-width="1"/>
                    <!-- Header label -->
                    <text x="108" y="22" text-anchor="middle"
                          fill="#64748b" font-size="7" font-family="'IBM Plex Mono',monospace"
                          letter-spacing="2" text-transform="uppercase">TEAM CHEMISTRY</text>
                    <!-- Divider -->
                    <line x1="108" y1="26" x2="108" y2="58" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
                    <!-- OFF side -->
                    <text x="20" y="46" fill="#4ade80" font-size="20"
                          font-family="'IBM Plex Mono',monospace" font-weight="700"
                          id="totalOffText">—</text>
                    <text x="20" y="58" fill="#4ade80" font-size="7"
                          font-family="'IBM Plex Mono',monospace" letter-spacing="1.5">OFFENSIVE</text>
                    <!-- DEF side -->
                    <text x="118" y="46" fill="#fbbf24" font-size="20"
                          font-family="'IBM Plex Mono',monospace" font-weight="700"
                          id="totalDefText">—</text>
                    <text x="118" y="58" fill="#fbbf24" font-size="7"
                          font-family="'IBM Plex Mono',monospace" letter-spacing="1.5">DEFENSIVE</text>
                </g>
            </svg>
        </div>
    </div>
</div>
</div><!-- /view-pitch -->

<div class="mob-view" id="view-stats">
<!-- ── PANEL H2H DERECHO ──────────────────────────────────────── -->
<div class="h2h-panel">
    <div class="section-divider"><span>H2H CHEMISTRY</span></div>
    <div class="control-group">
        <label>PLAYER 1</label>
        <div class="select-wrap">
            <select id="h2hPlayer1" onchange="calcH2H()">
                <option value="">Select player</option>
            </select>
        </div>
        <label>PLAYER 2</label>
        <div class="select-wrap">
            <select id="h2hPlayer2" onchange="calcH2H()">
                <option value="">Select player</option>
            </select>
        </div>
    </div>

    <div id="h2hResult" class="hidden">
        <div class="h2h-names">
            <span id="h2hN1">—</span>
            <span class="vs-sep">&</span>
            <span id="h2hN2">—</span>
        </div>
        <div class="h2h-bar-wrap" style="margin: 10px 0 6px;">
            <div class="h2h-bar" id="h2hBar" style="width:0%"></div>
        </div>
        <div class="h2h-stats">
            <div class="stat-item">
                <span class="stat-label">OFF</span>
                <span class="stat-val green" id="h2hOff">—</span>
            </div>
            <div class="stat-item">
        <span class="stat-label">MATCHES</span>
                <span class="stat-val blue" id="h2hGames">—</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">DEF</span>
                <span class="stat-val" id="h2hDef" style="color:var(--warn)">—</span>
            </div>
        </div>
        <!-- Métricas raw del paper -->
        <div class="raw-metrics">
            <div class="raw-metric-row">
                <span class="raw-label">JOI90</span>
                <span class="raw-val" id="h2hJOI" style="color:#4ade80">—</span>
            </div>
            <div class="raw-metric-row">
                <span class="raw-label">JDI90</span>
                <span class="raw-val" id="h2hJDI" style="color:#fbbf24">—</span>
            </div>
            <div class="raw-metric-row">
                <span class="raw-label">Position 1</span>
                <span class="raw-val" id="h2hPos1" style="color:var(--muted);font-size:0.62rem">—</span>
            </div>
            <div class="raw-metric-row">
                <span class="raw-label">Position 2</span>
                <span class="raw-val" id="h2hPos2" style="color:var(--muted);font-size:0.62rem">—</span>
            </div>
        </div>
    </div>

    <!-- Placeholder cuando no hay selección -->
    <div id="h2hEmpty" style="padding:20px 14px; text-align:center;">
        <div style="font-family:var(--font-mono);font-size:0.62rem;color:var(--muted);letter-spacing:1px;line-height:1.8">
            Select two players<br>to see their<br>chemistry
        </div>
    </div>
</div>
<!-- ── / H2H ─────────────────────────────────────────────────── -->
</div><!-- /view-stats -->

<!-- ── TAB BAR MÓVIL ─────────────────────────────────────────── -->
<nav class="mob-tabbar">
    <button class="mob-tab" id="tab-xi"    onclick="switchView('xi')">
        <span class="tab-icon">📋</span>XI
    </button>
    <button class="mob-tab active" id="tab-pitch" onclick="switchView('pitch')">
        <span class="tab-icon">⚽</span>PITCH
    </button>
    <button class="mob-tab" id="tab-stats" onclick="switchView('stats')">
        <span class="tab-icon">📊</span>STATS
    </button>
</nav>
<!-- ── / TAB BAR ─────────────────────────────────────────────── -->

<script>
    let allPlayers = [];
    const FORMATIONS = {
        "442": {
            slots: ["PO", "DF", "DF", "DF", "DF", "MC", "MC", "MC", "MC", "DL", "DL"],
            labels: ["POR", "LD", "DFC", "DFC", "LI", "MD", "MC", "MC", "MI", "DC", "DC"],
            coords: [[200, 540], [330, 420], [240, 440], [160, 440], [70, 420], [330, 280], [240, 300], [160, 300], [70, 280], [250, 130], [150, 130]]
        },
        "433": {
            slots: ["PO", "DF", "DF", "DF", "DF", "MC", "MC", "MC", "DL", "DL", "DL"],
            labels: ["POR", "LD", "DFC", "DFC", "LI", "MC", "MC", "MC", "ED", "DC", "EI"],
            coords: [[200, 540], [330, 420], [240, 440], [160, 440], [70, 420], [280, 280], [200, 310], [120, 280], [320, 140], [200, 100], [80, 140]]
        }
    };

    async function init() {
        const res = await fetch("/teams");
        const teams = await res.json();
        const sel = document.getElementById("teamSelect");
        teams.forEach(t => {
            const opt = document.createElement("option");
            opt.value = t; opt.text = t;
            sel.appendChild(opt);
        });
        if(teams.length) loadPlayers();
    }

    async function loadPlayers() {
        const team = document.getElementById("teamSelect").value;
        const res = await fetch("/players_by_team", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({team})
        });
        allPlayers = await res.json();
        renderSlots();
        populateH2H();
    }

    function populateH2H() {
        const names = allPlayers.map(p => p.name).sort();
        ["h2hPlayer1", "h2hPlayer2"].forEach(id => {
            const sel = document.getElementById(id);
            sel.innerHTML = '<option value="">Select player</option>';
            names.forEach(n => {
                const opt = document.createElement("option");
                opt.value = n; opt.text = n;
                sel.appendChild(opt);
            });
        });
        document.getElementById("h2hResult").classList.add("hidden");
    }

    async function calcH2H() {
        const team = document.getElementById("teamSelect").value;
        const p1 = document.getElementById("h2hPlayer1").value;
        const p2 = document.getElementById("h2hPlayer2").value;
        const resultDiv = document.getElementById("h2hResult");
        const emptyDiv  = document.getElementById("h2hEmpty");

        if (!p1 || !p2 || p1 === p2) {
            resultDiv.classList.add("hidden");
            emptyDiv.style.display = "";
            return;
        }

        const res = await fetch("/pair_chemistry", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({team, player1: p1, player2: p2})
        });
        const data = await res.json();

        if (!data.found) {
            resultDiv.classList.add("hidden");
            emptyDiv.style.display = "";
            return;
        }

        const shortName = n => { const p = n.split(' '); return (p.length > 1 ? p[1] : p[0]).toUpperCase(); };
        document.getElementById("h2hN1").textContent    = shortName(p1);
        document.getElementById("h2hN2").textContent    = shortName(p2);
        document.getElementById("h2hOff").textContent   = data.offensive.toFixed(2);
        document.getElementById("h2hGames").textContent = data.co_games;
        document.getElementById("h2hDef").textContent   = data.defensive !== null ? data.defensive.toFixed(2) : "—";
        document.getElementById("h2hBar").style.width   = (data.offensive * 10) + "%";

        // JOI90 / JDI90 raw del paper
        document.getElementById("h2hJOI").textContent  = data.joi90 !== undefined ? data.joi90.toFixed(4) : "—";
        document.getElementById("h2hJDI").textContent  = data.jdi90 !== undefined ? data.jdi90.toFixed(4) : "—";
        document.getElementById("h2hPos1").textContent = data.p1_pos || "—";
        document.getElementById("h2hPos2").textContent = data.p2_pos || "—";

        emptyDiv.style.display = "none";
        resultDiv.classList.remove("hidden");
    }

    function renderSlots() {
        const fKey = document.getElementById("formationSelect").value;
        const config = FORMATIONS[fKey];
        const container = document.getElementById("selectors");
        container.innerHTML = "";

        config.slots.forEach((cat, i) => {
            const div = document.createElement("div");
            div.className = "player-slot";
            const filtered = allPlayers.filter(p => p.cat === cat);
            const catColors = { PO: "#fbbf24", DF: "#38bdf8", MC: "#a78bfa", DL: "#4ade80" };
            const color = catColors[cat] || "#64748b";
            div.innerHTML = `
                <div class="slot-header">
                    <span class="slot-label" style="color:${color}">${config.labels[i]}</span>
                </div>
                <div class="select-wrap">
                    <select onchange="updateNetwork()" data-idx="${i}">
                        <option value="">—</option>
                        ${filtered.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}
                    </select>
                </div>
            `;
            container.appendChild(div);
        });
        updateNetwork();
    }

    async function updateNetwork() {
        const team = document.getElementById("teamSelect").value;
        const selects = document.querySelectorAll("#selectors select");
        const players = Array.from(selects).map(s => s.value).filter(v => v !== "");

        const [edgesRes, totalRes] = await Promise.all([
            fetch("/team_chemistry", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({players, team})
            }),
            fetch("/team_total", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({players, team})
            })
        ]);

        const edges = await edgesRes.json();
        const total = await totalRes.json();
        draw(edges, total);
    }

    function draw(edges, total) {
        const fKey = document.getElementById("formationSelect").value;
        const config = FORMATIONS[fKey];
        const selects = document.querySelectorAll("#selectors select");
        const nodesG = document.getElementById("nodes");
        const edgesG = document.getElementById("edges");
        nodesG.innerHTML = ""; edgesG.innerHTML = "";

        // Update total chemistry badge
        if (total && total.pairs > 0) {
            document.getElementById("totalOffText").textContent = total.avg_offensive.toFixed(2);
            document.getElementById("totalDefText").textContent = total.avg_defensive.toFixed(2);
        } else {
            document.getElementById("totalOffText").textContent = "—";
            document.getElementById("totalDefText").textContent = "—";
        }

        const currentSelection = {};
        selects.forEach((s, i) => {
            if(s.value) currentSelection[s.value] = config.coords[i];
        });

        // Tooltip SVG reutilizable
        const tooltip = document.createElementNS("http://www.w3.org/2000/svg", "g");
        tooltip.setAttribute("id", "edgeTooltip");
        tooltip.setAttribute("pointer-events", "none");
        tooltip.style.display = "none";
        tooltip.innerHTML = `
            <rect id="ttBg" rx="5" fill="rgba(7,16,31,0.92)" stroke="rgba(56,189,248,0.35)" stroke-width="1"/>
            <text id="ttNames" x="0" y="0" fill="#e2eaf5" font-size="8.5" font-family="'IBM Plex Mono',monospace" font-weight="600"></text>
            <text id="ttOff"   x="0" y="0" fill="#4ade80"  font-size="8"   font-family="'IBM Plex Mono',monospace"></text>
            <text id="ttDef"   x="0" y="0" fill="#fbbf24"  font-size="8"   font-family="'IBM Plex Mono',monospace"></text>
        `;
        edgesG.appendChild(tooltip);

        function showTooltip(evt, edge) {
            const svgEl = document.getElementById("pitch");
            const pt = svgEl.createSVGPoint();
            pt.x = evt.clientX; pt.y = evt.clientY;
            const svgP = pt.matrixTransform(svgEl.getScreenCTM().inverse());

            const shortN = n => { const p = n.split(' '); return (p.length > 1 ? p[1] : p[0]).toUpperCase(); };
            const names = `${shortN(edge.p1)} × ${shortN(edge.p2)}`;
            const offTxt = `OFF ${edge.value.toFixed(2)}`;
            const defTxt = `DEF ${edge.defensive !== null ? edge.defensive.toFixed(2) : "—"}`;

            // Posición del tooltip con margen al borde
            const tx = Math.min(svgP.x + 8, 310);
            const ty = Math.max(svgP.y - 42, 5);

            const ttNames = document.getElementById("ttNames");
            const ttOff   = document.getElementById("ttOff");
            const ttDef   = document.getElementById("ttDef");
            const ttBg    = document.getElementById("ttBg");

            ttNames.setAttribute("x", tx + 8); ttNames.setAttribute("y", ty + 13); ttNames.textContent = names;
            ttOff.setAttribute("x", tx + 8);   ttOff.setAttribute("y", ty + 25);   ttOff.textContent = offTxt;
            ttDef.setAttribute("x", tx + 58);  ttDef.setAttribute("y", ty + 25);   ttDef.textContent = defTxt;
            ttBg.setAttribute("x", tx); ttBg.setAttribute("y", ty);
            ttBg.setAttribute("width", "105"); ttBg.setAttribute("height", "32");

            tooltip.style.display = "";
        }

        function hideTooltip() { tooltip.style.display = "none"; }

        edges.forEach(e => {
            const p1Coord = currentSelection[e.p1];
            const p2Coord = currentSelection[e.p2];
            if(!p1Coord || !p2Coord) return;

            // Línea visual
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", p1Coord[0]); line.setAttribute("y1", p1Coord[1]);
            line.setAttribute("x2", p2Coord[0]); line.setAttribute("y2", p2Coord[1]);
            line.setAttribute("stroke", e.value > 5 ? "#4ade80" : "#f87171");
            line.setAttribute("stroke-width", Math.max(1, e.value / 2));
            line.setAttribute("opacity", "0.6");
            edgesG.appendChild(line);

            // Línea invisible más ancha para capturar hover fácilmente
            const hitLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            hitLine.setAttribute("x1", p1Coord[0]); hitLine.setAttribute("y1", p1Coord[1]);
            hitLine.setAttribute("x2", p2Coord[0]); hitLine.setAttribute("y2", p2Coord[1]);
            hitLine.setAttribute("stroke", "transparent");
            hitLine.setAttribute("stroke-width", "12");
            hitLine.style.cursor = "pointer";
            hitLine.addEventListener("mouseenter", evt => showTooltip(evt, e));
            hitLine.addEventListener("mousemove",  evt => showTooltip(evt, e));
            hitLine.addEventListener("mouseleave", hideTooltip);
            edgesG.appendChild(hitLine);
        });


        edgesG.appendChild(tooltip);

        selects.forEach((s, i) => {
            if(!s.value) return;
            const [x, y] = config.coords[i];
            const nameParts = s.value.split(' ');
            const displayName = (nameParts.length > 1 ? nameParts[1] : nameParts[0]).toUpperCase();

            const cat = config.slots[i];
            const catColor = { PO: "#fbbf24", DF: "#38bdf8", MC: "#a78bfa", DL: "#4ade80" }[cat] || "#38bdf8";
            const catGlow  = { PO: "rgba(251,191,36,0.4)", DF: "rgba(56,189,248,0.4)", MC: "rgba(167,139,250,0.4)", DL: "rgba(74,222,128,0.4)" }[cat] || "rgba(56,189,248,0.4)";

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.innerHTML = `
                <circle cx="${x}" cy="${y}" r="22" fill="${catColor}" opacity="0.12"/>
                <circle cx="${x}" cy="${y}" r="18" fill="#0a1628" stroke="${catColor}" stroke-width="2"/>
                <text x="${x}" y="${y+4}" text-anchor="middle" fill="${catColor}"
                      font-size="9" font-family="'IBM Plex Mono',monospace" font-weight="700"
                      >${displayName}</text>
            `;
            nodesG.appendChild(g);
        });
    }

    async function autoXI(mode) {
        const team = document.getElementById("teamSelect").value;
        const fKey = document.getElementById("formationSelect").value;
        const slots = FORMATIONS[fKey].slots;

        const res = await fetch("/best_xi", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({team, slots, mode})
        });
        const best = await res.json();
        const selects = document.querySelectorAll("#selectors select");
        best.forEach((name, i) => { if(selects[i]) selects[i].value = name; });
        updateNetwork();
    }

    // ── MOBILE TAB NAVIGATION ───────────────────────────────────
    function switchView(name) {
        if (window.innerWidth > 768) return;
        ['xi', 'pitch', 'stats'].forEach(v => {
            document.getElementById('view-' + v).classList.toggle('active', v === name);
            document.getElementById('tab-'  + v).classList.toggle('active', v === name);
        });
        if (name === 'pitch') updateNetwork();
    }
    // ── / MOBILE ────────────────────────────────────────────────

    init();</script>
</body>
</html>
